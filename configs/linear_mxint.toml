# Replaces nn.Linear with LinearMXInt:
#   - q/k/v/o_proj     → LinearMXInt (weight=MXINT4, data_in=MXINT4, bias=MXINT4)
#   - gate/up/down_proj → LinearMXInt (weight=MXINT4, data_in=MXINT4, bias=MXINT4)

by = "regex_name"

# --- Attention projections ---
["model\\.layers\\.\\d+\\.self_attn\\.(q|k|v|o)_proj"]
name = "mxint"
weight_block_size = 16
weight_width = 4
data_in_block_size = 16
data_in_width = 4
bias_block_size = 16
bias_width = 4

# --- MLP projections ---
["model\\.layers\\.\\d+\\.mlp\\.(gate|up|down)_proj"]
name = "mxint"
weight_block_size = 16
weight_width = 4
data_in_block_size = 16
data_in_width = 4
bias_block_size = 16
bias_width = 4
