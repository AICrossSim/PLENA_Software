# Pass 1: Composite module replacement (Attention, MLP, RMSNorm, Embedding)
#
# Replaces composite modules with MX-quantized variants:
#   - self_attn  → LlamaAttentionMXInt  (matmul=MXINT4, rope/softmax=minifloat, kvcache=MXINT4)
#   - mlp        → LlamaMLPMXFP         (silu=minifloat E3M4)
#   - layernorm  → LlamaRMSNormMinifloat (weight+input=minifloat E3M4)
#   - embed      → EmbeddingMXInt       (weight=MXINT4)

by = "regex_name"

# --- Attention: MXInt quantized ---
["model\\.layers\\.\\d+\\.self_attn"]
name = "mxint"

    ["model\\.layers\\.\\d+\\.self_attn".qk_matmul]
    data_in_block_size = 16
    data_in_width = 4

    ["model\\.layers\\.\\d+\\.self_attn".av_matmul]
    data_in_block_size = 16
    data_in_width = 4

    ["model\\.layers\\.\\d+\\.self_attn".rope]
    data_in_exponent_width = 3
    data_in_frac_width = 4

    ["model\\.layers\\.\\d+\\.self_attn".softmax]
    data_in_exponent_width = 3
    data_in_frac_width = 4

    ["model\\.layers\\.\\d+\\.self_attn".kv_cache]
    data_in_block_size = 16
    data_in_width = 4


# --- MLP: SiLU minifloat ---
["model\\.layers\\.\\d+\\.mlp"]
name = "mxfp"
data_in_exponent_width = 3
data_in_frac_width = 4


# --- RMSNorm: minifloat ---
["model\\.layers\\.\\d+\\.(input_layernorm|post_attention_layernorm)"]
name = "minifloat"
weight_exponent_width = 3
weight_frac_width = 4
data_in_exponent_width = 3
data_in_frac_width = 4


# --- Embedding: MXInt ---
["model\\.embed_tokens"]
name = "mxint"
weight_block_size = 16
weight_width = 4
