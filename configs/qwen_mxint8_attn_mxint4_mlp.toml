# Qwen mixed precision: MXInt8 attention, MXInt4 MLP
#
# Attention layers use higher precision (8-bit) since they are
# more sensitive to quantization noise (KV cache quality).
# MLP layers use lower precision (4-bit) for efficiency.

by = "regex_name"

# --- Attention projections (MXInt8) ---
["model\\.layers\\.\\d+\\.self_attn\\.(q|k|v|o)_proj"]
name = "mxint"
weight_block_size = 32
weight_width = 8
data_in_block_size = 32
data_in_width = 8

# --- MLP projections (MXInt4) ---
["model\\.layers\\.\\d+\\.mlp\\.(gate|up|down)_proj"]
name = "mxint"
weight_block_size = 32
weight_width = 4
data_in_block_size = 32
data_in_width = 4
